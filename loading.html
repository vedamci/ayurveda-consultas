<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ayurveda Consultas</title>
  <style>
    body {
      background-color: #f7fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #2d3748;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.05);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #0f766e; /* Teal color matching VEDAMCI styling */
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      margin-top: 24px;
      font-weight: 500;
      font-size: 1.25rem;
      color: #111827;
    }
    p {
      color: #6b7280;
      font-size: 0.875rem;
      margin-top: 8px;
      max-width: 320px;
      text-align: center;
      line-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Iniciando Ayurveda Consultas</h2>
  <p>Conectando con el servidor y cargando tu base de datos de Notion...</p>
</body>
</html>
